# =====================================================================
#  Apache overrides — mounted into conf-enabled (loaded last).
#  Lets long migration uploads/extractions run without being cut off.
# =====================================================================

# Suppress the "could not reliably determine the server's FQDN" warning.
ServerName localhost

# --- Real client IP behind a trusted reverse proxy ------------------
# mod_remoteip rewrites REMOTE_ADDR to the real client IP from
# X-Forwarded-For, but ONLY when the request actually comes from a trusted
# proxy — so other containers on the shared proxy network can't spoof it.
# TRUSTED_PROXY_CIDRS is injected from the environment (docker-compose.yml
# / .env); Apache expands ${VAR} from the process environment at startup.
# For best security narrow it to your edge proxy's exact subnet; the
# default trusts private ranges (the proxy is always a private container).
<IfModule mod_remoteip.c>
    RemoteIPHeader X-Forwarded-For
    RemoteIPTrustedProxy ${TRUSTED_PROXY_CIDRS}
</IfModule>

# Max time Apache waits on a slow request/response (extraction, import).
Timeout 900

# No cap on request body size — backup files can be several GB.
# (PHP's upload_max_filesize / post_max_size still apply.)
LimitRequestBody 0

# mod_reqtimeout aborts "slow" uploads by default. Disable the body
# timeout so multi-GB backup uploads on slow links are not killed.
<IfModule mod_reqtimeout.c>
    RequestReadTimeout header=20-40,MinRate=500 body=0
</IfModule>

# Keep-alive helps the many small asset requests Elementor pages make.
KeepAlive On
MaxKeepAliveRequests 200
KeepAliveTimeout 5
