name: ${STACK_NAME:-wordpress}

# Shared logging policy: cap container logs so disk never fills up.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

# DB/WordPress env shared by the web container and the wp-cron sidecar.
# wp-cli in the sidecar reads these to connect to the same database.
x-wp-db-env: &wp-db-env
  WORDPRESS_DB_HOST: db:3306
  WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
  WORDPRESS_DB_USER: ${MYSQL_USER}
  WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
  WORDPRESS_TABLE_PREFIX: ${WORDPRESS_TABLE_PREFIX}

services:
  db:
    image: mariadb:11.4
    container_name: ${STACK_NAME:-wordpress}_db
    restart: unless-stopped
    logging: *default-logging
    environment:
      MARIADB_DATABASE: ${MYSQL_DATABASE}
      MARIADB_USER: ${MYSQL_USER}
      MARIADB_PASSWORD: ${MYSQL_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MARIADB_AUTO_UPGRADE: "1"
      TZ: ${TZ}
    volumes:
      - db_data:/var/lib/mysql
      - ./mariadb/my.cnf:/etc/mysql/conf.d/zz-custom.cnf:ro
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${DB_MEM_LIMIT:-2g}
        reservations:
          memory: ${DB_MEM_RESERVATION:-512m}
    networks:
      - internal

  redis:
    image: redis:7.4-alpine
    container_name: ${STACK_NAME:-wordpress}_redis
    restart: unless-stopped
    logging: *default-logging
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - ${REDIS_MAXMEMORY:-512mb}
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "[ \"$$(redis-cli --raw -a \"${REDIS_PASSWORD}\" ping 2>/dev/null)\" = \"PONG\" ]" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-640m}
        reservations:
          memory: ${REDIS_MEM_RESERVATION:-128m}
    networks:
      - internal

  wordpress:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${STACK_NAME:-wordpress}-wp:local
    container_name: ${STACK_NAME:-wordpress}_wordpress
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *wp-db-env
      WORDPRESS_DEBUG: ${WORDPRESS_DEBUG}
      WORDPRESS_CONFIG_EXTRA: |
        /* URLs */
        define('WP_HOME', '${WP_HOME}');
        define('WP_SITEURL', '${WP_SITEURL}');

        /* Trust the reverse proxy (Nginx Proxy Manager) for HTTPS */
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
            $$_SERVER['HTTPS'] = 'on';
        }
        if (isset($$_SERVER['HTTP_X_FORWARDED_FOR'])) {
            $$_SERVER['REMOTE_ADDR'] = trim(explode(',', $$_SERVER['HTTP_X_FORWARDED_FOR'])[0]);
        }

        /* Filesystem & updates */
        define('FS_METHOD', 'direct');
        define('AUTOMATIC_UPDATER_DISABLED', true);
        define('WP_AUTO_UPDATE_CORE', 'minor');

        /* Memory */
        define('WP_MEMORY_LIMIT', '${WP_MEMORY_LIMIT:-1024M}');
        define('WP_MAX_MEMORY_LIMIT', '${WP_MAX_MEMORY_LIMIT:-1024M}');

        /* Redis object cache */
        define('WP_CACHE', true);
        define('WP_REDIS_HOST', 'redis');
        define('WP_REDIS_PORT', 6379);
        define('WP_REDIS_PASSWORD', '${REDIS_PASSWORD}');
        define('WP_REDIS_TIMEOUT', 1);
        define('WP_REDIS_READ_TIMEOUT', 1);
        define('WP_REDIS_DATABASE', 0);
        define('WP_REDIS_PREFIX', '${STACK_NAME:-wp}_');

        /* Environment (keeps Site Health + plugins in production mode) */
        define('WP_ENVIRONMENT_TYPE', '${WP_ENVIRONMENT_TYPE:-production}');

        /* Cron: real cron is run by the wp-cron sidecar, so disable the
           visitor-triggered pseudo-cron (reliable scheduled events). */
        define('DISABLE_WP_CRON', true);
        define('WP_CRON_LOCK_TIMEOUT', 60);

        /* Content hygiene */
        define('WP_POST_REVISIONS', 10);
        define('AUTOSAVE_INTERVAL', 120);
        define('EMPTY_TRASH_DAYS', 14);

        /* Security hardening */
        define('DISALLOW_FILE_EDIT', true);
        define('DISALLOW_FILE_MODS', ${DISALLOW_FILE_MODS:-false});
        define('FORCE_SSL_ADMIN', true);

        /* Debug logging (controlled by WORDPRESS_DEBUG env) */
        define('WP_DEBUG_LOG', WP_DEBUG);
        define('WP_DEBUG_DISPLAY', false);
    ports:
      # Behind a domain proxy (NPM/Caddy) the site is reached over the
      # "proxy" network by container name, so this host port is only for
      # direct/local access. Bound to 127.0.0.1 by default (not public).
      # Multi-site: give each stack a UNIQUE WORDPRESS_LOCAL_PORT.
      # For direct external access (IP:port, no domain) set WP_HTTP_BIND=0.0.0.0.
      - "${WP_HTTP_BIND:-127.0.0.1}:${WORDPRESS_LOCAL_PORT}:80"
    volumes:
      - wp_data:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/zz-wordpress.ini:ro
      - ./apache/migration.conf:/etc/apache2/conf-enabled/zz-migration.conf:ro
    healthcheck:
      # No curl/wget in the image, so probe port 80 with PHP (always present).
      test: [ "CMD", "php", "-r", "exit(@fsockopen('localhost', 80, $$e, $$s, 2) ? 0 : 1);" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: ${WP_MEM_LIMIT:-2g}
        reservations:
          memory: ${WP_MEM_RESERVATION:-512m}
    networks:
      - internal
      - proxy

  # Real WP-Cron: runs due events every 60s via wp-cli. Replaces the
  # unreliable visitor-triggered pseudo-cron (Action Scheduler, WooCommerce
  # emails, WPvivid backups, Elementor housekeeping all depend on this).
  wp-cron:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${STACK_NAME:-wordpress}-wp:local
    container_name: ${STACK_NAME:-wordpress}_wpcron
    restart: unless-stopped
    logging: *default-logging
    user: www-data
    depends_on:
      wordpress:
        condition: service_healthy
    environment:
      <<: *wp-db-env
    working_dir: /var/www/html
    volumes:
      - wp_data:/var/www/html
      - ./php/php.ini:/usr/local/etc/php/conf.d/zz-wordpress.ini:ro
    entrypoint: [ "/bin/sh", "-c" ]
    command:
      - |
        echo "[wp-cron] starting cron loop"
        while true; do
          if wp core is-installed --quiet 2>/dev/null; then
            wp cron event run --due-now --quiet 2>/dev/null || true
          fi
          sleep 60
        done
    deploy:
      resources:
        limits:
          memory: ${WPCRON_MEM_LIMIT:-256m}
    networks:
      - internal

  # Daily DB (+ optional wp-content) backup to S3-compatible storage
  # (Timeweb Cloud, Selectel, AWS S3, ...). Schedule + retention via .env.
  #
  # Opt-in: this service only starts when the "backup" profile is enabled,
  # so a stack without S3 configured won't spam its logs with failed runs.
  # Enable it with:   docker compose --profile backup up -d
  # (or add COMPOSE_PROFILES=backup to .env to turn it on permanently).
  backup:
    profiles: [ "backup" ]
    build:
      context: ./backup
      dockerfile: Dockerfile
    image: ${STACK_NAME:-wordpress}-backup:local
    container_name: ${STACK_NAME:-wordpress}_backup
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      DB_HOST: db
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      # Schedule / retention / scope
      BACKUP_HOUR: ${BACKUP_HOUR:-3}
      RETENTION_DAYS: ${RETENTION_DAYS:-14}
      BACKUP_FILES: ${BACKUP_FILES:-true}
      BACKUP_ON_START: ${BACKUP_ON_START:-false}
      # Where in the bucket to store this site's backups
      S3_BUCKET: ${S3_BUCKET}
      S3_PATH: ${S3_PATH:-${STACK_NAME:-wordpress}}
      # rclone S3 remote (works with any S3-compatible provider)
      RCLONE_CONFIG_S3_TYPE: s3
      RCLONE_CONFIG_S3_PROVIDER: ${S3_PROVIDER:-Other}
      RCLONE_CONFIG_S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      RCLONE_CONFIG_S3_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      RCLONE_CONFIG_S3_ENDPOINT: ${S3_ENDPOINT}
      RCLONE_CONFIG_S3_REGION: ${S3_REGION:-}
      RCLONE_CONFIG_S3_ACL: private
    volumes:
      - wp_data:/var/www/html:ro   # read-only, only for the files backup
    networks:
      - internal

volumes:
  db_data:
  wp_data:
  redis_data:

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: ${PROXY_NETWORK}
