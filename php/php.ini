; =====================================================================
;  WordPress PHP tuning — mounted into conf.d (loaded last, overrides).
;  PHP .ini does NOT expand ${ENV} variables, so values are concrete.
;
;  This is the HEAVY profile: Elementor + WooCommerce on a server with
;  plenty of RAM. For smaller sites copy a lighter profile over this
;  file instead (the compose mount always reads php/php.ini):
;    cp php/php.ini.light.example  php/php.ini   # small blog / brochure
;    cp php/php.ini.medium.example php/php.ini   # mid-size WooCommerce
;  Then restart:  docker compose up -d wordpress
; =====================================================================

; --- Uploads / memory / execution -----------------------------------
;  Elementor needs lots of memory + high max_input_vars (big page edits
;  POST hundreds of fields). WooCommerce imports need generous limits.
;  Upload/time limits are raised so Duplicator / WPvivid can upload and
;  extract multi-GB migration packages through the browser.
file_uploads           = On
memory_limit           = 1024M
upload_max_filesize    = 2048M
post_max_size          = 2048M
max_execution_time     = 900
max_input_time         = 900
max_input_vars         = 10000
max_file_uploads       = 50
default_socket_timeout = 120

; --- Errors (no output in prod, log to container stderr) ------------
display_errors         = Off
display_startup_errors = Off
log_errors             = On
error_reporting        = E_ALL & ~E_DEPRECATED & ~E_STRICT
error_log              = /dev/stderr

; --- Security -------------------------------------------------------
expose_php             = Off
allow_url_fopen        = On
allow_url_include      = Off
cgi.fix_pathinfo       = 0

; --- Realpath cache (big win for WP's many file includes) -----------
realpath_cache_size    = 4096k
realpath_cache_ttl     = 600

; --- OPcache --------------------------------------------------------
;  Elementor + Woo + their add-ons = tens of thousands of PHP files,
;  so give OPcache plenty of memory and file slots.
opcache.enable                  = 1
opcache.enable_cli              = 0
opcache.memory_consumption      = 512
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files   = 50000
opcache.validate_timestamps     = 1
opcache.revalidate_freq         = 2
opcache.save_comments           = 1
opcache.fast_shutdown           = 1
opcache.enable_file_override    = 0
opcache.huge_code_pages         = 1

; --- OPcache JIT (PHP 8.x) ------------------------------------------
opcache.jit                     = tracing
opcache.jit_buffer_size         = 128M
